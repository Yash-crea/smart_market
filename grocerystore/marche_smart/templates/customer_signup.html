{% extends 'base.html' %}
{% load static %}
{% block content %}
<section class="login-container">
  <div class="login-card">
    <h1>Create Account</h1>
    {% if error %}
      <div class="error-message">{{ error }}</div>
    {% endif %}
    <form method="post" class="login-form">
      {% csrf_token %}
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" minlength="6" required>
      </div>
      <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>
    <p style="margin-top: 1.2rem; font-size: 1rem; color: #555;">Already have an account? <a href="{% url 'smart_market:login' %}">Log in here</a></p>
  </div>
</section>
{% endblock %}
